name: Daily market data

on:
  # 定期実行は Cloud Scheduler → Cloud Run Job (invest-daily) に移行済み。
  # ここは手動フォールバック専用（GitHub Actions の schedule は発火が不安定なため廃止）。
  repository_dispatch:
    types: [run-daily-data]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: invest-market-data
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if already updated today (JST)
        id: check
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y/%m/%d)
          LAST=$(python -c "import json; print(json.load(open('data/latest.json')).get('display_date',''))" 2>/dev/null || echo "")
          echo "today(JST)=$TODAY / display_date=$LAST"
          if [ "$LAST" = "$TODAY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "✅ 本日($TODAY)は既に更新済み。以降のステップをスキップします。"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "▶ 本日($TODAY)は未更新。実行します。"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.run == 'true'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.check.outputs.run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Build latest and history JSON
        if: steps.check.outputs.run == 'true'
        run: python scripts/fetch_market_data.py

      # スクショ・ツイートが失敗してもデータ更新は必ず反映されるよう、先にコミットする。
      - name: Commit updated data
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update market data"
            git pull --rebase origin main
            git push
          fi

      - name: Write service account credentials
        id: creds
        if: steps.check.outputs.run == 'true'
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "⚠ GOOGLE_CREDENTIALS_JSON が未設定のため、スクショとツイートをスキップします。"
          else
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" > service_account.json
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
            echo "wrote service_account.json"
          fi

      - name: Take Google Sheets Screenshots
        if: steps.check.outputs.run == 'true' && steps.creds.outputs.has_creds == 'true'
        continue-on-error: true
        env:
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/service_account.json
        run: python scripts/take_screenshot.py

      - name: Tweet Market Report
        if: steps.check.outputs.run == 'true' && steps.creds.outputs.has_creds == 'true'
        continue-on-error: true
        env:
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/service_account.json
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
        run: python scripts/py2tweet_free.py --sheet 09_General

      - name: Cleanup credentials
        if: always()
        run: rm -f service_account.json

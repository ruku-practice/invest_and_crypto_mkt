name: Daily market data

on:
  repository_dispatch:
    types: [run-daily-data]
  schedule:
    # フォールバック専用: 朝 7:00 JST = 22:00 UTC
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: invest-market-data
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if already updated today (JST)
        id: check
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y/%m/%d)
          LAST=$(python -c "import json; print(json.load(open('data/latest.json')).get('display_date',''))" 2>/dev/null || echo "")
          echo "today(JST)=$TODAY / display_date=$LAST"
          if [ "$LAST" = "$TODAY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "✅ 本日($TODAY)は既に更新済み。以降のステップをスキップします。"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "▶ 本日($TODAY)は未更新。実行します。"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.run == 'true'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.check.outputs.run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Build latest and history JSON
        if: steps.check.outputs.run == 'true'
        run: python scripts/fetch_market_data.py

      - name: Commit updated data
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update market data"
            git push
          fi

name: Daily market news

on:
  repository_dispatch:
    types: [run-daily-news]
  schedule:
    # フォールバック専用: 朝 7:10 JST = 22:10 UTC
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: invest-market-news
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build market news JSON
        run: python scripts/fetch_market_news.py

      - name: Commit updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/news/latest.json
          if git diff --cached --quiet; then
            echo "No news changes"
          else
            git commit -m "Update market news"
            git push
          fi
